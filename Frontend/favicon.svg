<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0056b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d82;stop-opacity:1" />
    </linearGradient>
    <pattern id="networkPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="white" opacity="0.3"/>
      <circle cx="6" cy="6" r="0.5" fill="white" opacity="0.3"/>
      <line x1="2" y1="2" x2="6" y2="6" stroke="white" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="32" height="32" fill="url(#networkGrad)" rx="4"/>
  <rect width="32" height="32" fill="url(#networkPattern)" rx="4"/>
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">A</text>
  <circle cx="16" cy="16" r="12" fill="none" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <circle cx="8" cy="8" r="1" fill="white" opacity="0.6"/>
  <circle cx="24" cy="8" r="1" fill="white" opacity="0.6"/>
  <circle cx="8" cy="24" r="1" fill="white" opacity="0.6"/>
