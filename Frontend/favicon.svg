  <line x1="8" y1="8" x2="16" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="8" x2="16" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="24" x2="16" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="24" x2="16" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
